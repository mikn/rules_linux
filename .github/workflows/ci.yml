name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout rules_qemu
        run: git clone --depth=1 https://github.com/mikn/rules_qemu.git /tmp/rules_qemu

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-${{ runner.os }}-

      - name: Build
        run: bazel build //... --override_module=rules_qemu=/tmp/rules_qemu

      - name: Test
        run: bazel test //... --override_module=rules_qemu=/tmp/rules_qemu
