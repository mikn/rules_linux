# Bootstrap rootfs for the macOS (Apple Silicon) kernel_build VM path.
#
# ARM64 variant of the LLVM/clang toolchain for building Linux kernels
# inside a QEMU guest with HVF acceleration on Apple Silicon Macs.
#
# To regenerate the lock file after changing packages:
#   bazel run @bootstrap_debian_arm64//:lock
version: 1

sources:
  - channel: trixie main
    url: https://snapshot.debian.org/archive/debian/20260311T203443Z

archs:
  - arm64

packages:
  # Bootstrap kernel (to boot the builder VM)
  - linux-image-arm64

  # LLVM kernel build toolchain (make LLVM=1)
  - clang
  - lld
  - llvm
  - make
  - ccache
  - flex
  - bison
  - bc
  - libelf-dev
  - libssl-dev
  - cpio
  - kmod
  - xz-utils
  - rsync

  # POSIX userspace (no systemd)
  - bash
  - coreutils
  - util-linux
  - mount
  - findutils
  - grep
  - sed
  - gawk
  - diffutils
  - patch

  # Python 3 (required by kernel build scripts under scripts/)
  - python3

  # Perl (used by kernel build scripts under scripts/)
  - perl-base
